name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:buildcache,mode=max

  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List frontend files
        run: |
          echo "Current directory:"
          pwd
          echo "Frontend directory contents:"
          ls -la frontend/ || echo "Frontend directory not found"
          echo "Looking for Dockerfile:"
          ls -la frontend/Dockerfile || echo "Dockerfile not found in frontend"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:buildcache,mode=max

  notify:
    name: Build Status Notification
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build-backend.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ Both images built and pushed successfully!"
            echo "Backend: ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:latest"
            echo "Frontend: ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:latest"
          else
            echo "❌ Build failed!"
            exit 1
          fi
