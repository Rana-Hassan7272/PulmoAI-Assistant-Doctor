name: Build and Push Docker Images (Simple Fix)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual trigger

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        
      - name: Checkout backend submodule
        run: |
          git submodule init
          git submodule update --recursive
          
      - name: Debug backend
        run: |
          echo "Listing backend directory:"
          ls -la backend/ || echo "No backend directory"
          echo "Checking for backend Dockerfile:"
          ls -la backend/Dockerfile || echo "No Dockerfile in backend"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push backend image (try submodule Dockerfile)
        uses: docker/build-push-action@v5
        continue-on-error: true
        id: build_backend_main
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:${{ github.sha }}

      - name: Build and push backend image (fallback - create lightweight Dockerfile)
        if: steps.build_backend_main.outcome == 'failure'
        run: |
          # Create lightweight requirements (no heavy ML packages)
          cat > backend_requirements_lite.txt << 'EOF'
          fastapi==0.127.0
          uvicorn[standard]==0.37.0
          pydantic==2.10.6
          sqlalchemy==2.0.36
          bcrypt==5.0.0
          python-jose[cryptography]==3.3.0
          python-multipart==0.0.20
          groq==1.0.0
          openai==1.62.1
          langchain==1.2.0
          langchain-community==0.4.1
          langchain-core==1.2.4
          langgraph==1.0.5
          faiss-cpu==1.13.1
          PyPDF2==3.0.1
          reportlab==5.0.2
          scikit-learn==1.6.1
          xgboost==2.1.3
          Pillow==11.1.0
          numpy==2.1.3
          pandas==2.2.3
          requests==2.32.3
          aiofiles==24.1.0
          python-dotenv==1.0.1
          EOF
          
          # Create optimized Dockerfile for backend
          cat > backend_temp.Dockerfile << 'EOF'
          FROM python:3.11-slim
          
          WORKDIR /app
          
          # Install minimal system dependencies
          RUN apt-get update && apt-get install -y \
              gcc g++ \
              && apt-get clean \
              && rm -rf /var/lib/apt/lists/* \
              && rm -rf /var/cache/apt/*
          
          # Copy lightweight requirements
          COPY backend_requirements_lite.txt requirements.txt
          
          # Install Python dependencies with optimizations
          RUN pip install --no-cache-dir --disable-pip-version-check \
              -r requirements.txt \
              && pip cache purge
          
          # Copy backend application
          COPY backend/ .
          
          # Create directories
          RUN mkdir -p reports data/rag_index temp
          
          # Set environment
          ENV PYTHONUNBUFFERED=1
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PATH=/usr/local/bin:$PATH
          
          EXPOSE 8000
          
          # Simple health check
          HEALTHCHECK --interval=30s --timeout=10s --start-period=30s --retries=3 \
              CMD python -c "import requests; requests.get('http://localhost:8000/health', timeout=5)" || exit 1
          
          # Run application
          CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
          EOF

      - name: Build and push backend image (using temp Dockerfile)
        if: steps.build_backend_main.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend_temp.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:${{ github.sha }}

  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug frontend
        run: |
          echo "Listing frontend directory:"
          ls -la frontend/ || echo "No frontend directory"
          echo "Checking for frontend Dockerfile:"
          ls -la frontend/Dockerfile || echo "No Dockerfile in frontend"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push frontend image (try main Dockerfile)
        uses: docker/build-push-action@v5
        continue-on-error: true
        id: build_main
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:${{ github.sha }}

      - name: Build and push frontend image (fallback to cicd Dockerfile)
        if: steps.build_main.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./cicd/docker/frontend.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:${{ github.sha }}

  notify:
    name: Build Status Notification
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build-backend.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ Both images built and pushed successfully!"
            echo "Backend: ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-backend:latest"
            echo "Frontend: ${{ secrets.DOCKER_HUB_USERNAME }}/doctor-assistant-frontend:latest"
          else
            echo "❌ Build failed!"
            echo "Backend result: ${{ needs.build-backend.result }}"
            echo "Frontend result: ${{ needs.build-frontend.result }}"
            exit 1
          fi
